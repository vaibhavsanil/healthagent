version: '3.8'

services:
  web:
    build: .
    container_name: healthcare-chatbot-web
    ports:
      - "7860:7860"
    volumes:
      - .:/app
      - db_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///app/data/healthcare.db
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  db_data:
